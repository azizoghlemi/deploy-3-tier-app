apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: 3-tier-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: backend:latest
        ports:
        - containerPort: 5000
        env:
        - name: DATABASE_URL
          value: "postgres://user:password@mongo:5432/appdb"

---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: 3-tier-app
spec:
  selector:
    app: backend
  ports:
  - port: 5000
    targetPort: 5000
  type: LoadBalancer