name: Build & Push Docker Image Frontend

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker
      uses: docker/setup-buildx-action@v2
    
    - name: Build Frontend
      run: |
        cd frontend
        docker build -t frontend:${{ github.sha }} .
    
    - name: Build Database
      run: |
        echo "DB is using official mongo image - no build needed"
    
    - name: Log outputs
      run: |
        echo "Frontend image built with tag: ${{ github.sha }}"