name: Build & Push Docker Image Backend

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker
      uses: docker/setup-buildx-action@v2
   
    - name: Build Backend
      run: |
        cd backend
        docker build -t backend:${{ github.sha }} .
    
    - name: Build Database
      run: |
        echo "DB is using official mongo image - no build needed"
    
    - name: Log outputs
      run: |
        echo "Backend image built with tag: ${{ github.sha }}"